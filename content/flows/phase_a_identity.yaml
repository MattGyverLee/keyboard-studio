# Phase A -- Desktop-first posture notice (spec §8 step 5).
#
# Identity questions (autonym, English name, language code, script,
# writing direction, script-not-supported gate) now live in identity_lite.yaml.
#
# Routing outputs (routing_group, script_family) are pre-filled from the
# chosen base at the base-derived prefill step (engine-resolved; not survey
# questions). They are no longer emitted by this flow.
#
# Author identity (display name, email), copyright holder, region, and all
# provenance questions are deferred to the documentation stage (alongside
# Phase F). That stage's YAML is to be created.
#
# Phase A's sole remaining responsibility: surface the desktop-first authoring
# posture notice and ask the primary-target question so mobile-primary authors
# are warned before they invest survey time (spec §8 step 5, Decision 6).

flow_id: phase_a_identity
phase: "A"

questions:

  # -- Desktop-first notice ----------------------------------------------------

  - id: desktop_first_notice
    type: notice
    body: >
      This tool is designed around physical keyboards — the survey asks about
      key names, modifier keys (Shift, AltGr), and key combinations that exist
      on a hardware keyboard.

      If your keyboard is primarily used on mobile devices, you can still
      complete the survey. The survey results in a desktop keyboard layout,
      and a touch layout for mobile is scaffolded from it in Phase E of the
      survey, with a short gallery to enable features like longpress menus and
      layer switching.

      Touch-first authoring — where the survey is built around touchscreen
      gestures rather than physical keys — is a v1.1 roadmap candidate.
    next: pa_primary_target

  # -- Mobile-primary notification (spec §8 step 5, Decision 6) ---------------

  - id: pa_primary_target
    prompt: "Is this keyboard primarily for mobile (touchscreen) or desktop (physical keyboard) use?"
    help_text: >
      Keyboard Studio v1 is anchored to physical-keyboard mental models. You
      can complete the full authoring flow and a touch layout will be produced,
      but the survey questions are designed for desktop-first thinking. (See
      spec Decision 6)
    type: radio
    options:
      - value: desktop
        label: "Desktop (physical keyboard)"
      - value: mobile
        label: "Mobile (touchscreen)"
        note: >
          Keyboard Studio v1 is anchored to physical-keyboard mental models.
          You can complete the full authoring flow and a touch layout will be
          produced, but the survey questions are designed for desktop-first
          thinking. (See spec Decision 6)
      - value: both
        label: "Both desktop and mobile"
    required: false
    next: null
