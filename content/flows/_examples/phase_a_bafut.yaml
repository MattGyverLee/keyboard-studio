# Completed Phase A instance -- Bafut keyboard (hypothetical)
#
# This file shows what a finished phase_a_identity flow looks like after a
# language expert fills it in. The questionId values map 1:1 to the id fields
# in content/flows/phase_a_identity.yaml.
#
# writing_direction is not present because the script is Latin (LTR is automatic).
# script_family is not present because layout_family was 'qwerty', not 'non-roman'.
# provenance_opt_in is 'true', so all provenance questions are included.

flow_id: phase_a_identity
phase: "A"

answers:
