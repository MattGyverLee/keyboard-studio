    value: "Fa'"
  - questionId: language_name_english
    value: "Bafut"
  - questionId: iso_code
    value: "bfd"
  - questionId: region
    value: "Cameroon"
  - questionId: primary_script
    value: "Latn"
  - questionId: layout_family
    value: "qwerty"
  - questionId: author_display_name
    value: "Bafut Language Committee"
  - questionId: author_contact_email
    value: "bafut.keyboard@example.org"
  - questionId: provenance_opt_in
    value: "true"
  - questionId: provenance_requester_name
    value: "Bafut Language Committee"
  - questionId: provenance_requester_contact
    value: "bafut.keyboard@example.org"
  - questionId: provenance_requester_affiliation
