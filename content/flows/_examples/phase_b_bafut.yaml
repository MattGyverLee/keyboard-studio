# Completed Phase B instance -- Bafut keyboard (hypothetical)
#
# This file shows what a finished phase_b_characters flow looks like after a
# language expert fills it in. The questionId values map 1:1 to the id fields
# in content/flows/phase_b_characters.yaml.
#
# Language: Bafut (Fa'), ISO 639-3: bfd, Cameroon
# Script: Latin, routing_group: qwerty-qwertz (from Phase A)
# script_family: not applicable (Latin script)
#
# Questions not shown:
#   pb_routing_branch (engine-resolved node, never rendered)
#   pb_text_sample, pb_text_sample_review (manual path chosen)
#   pb_linguist_confirm (manual path chosen)
#   pb_picker_confirm (manual path chosen)
#   pb_latin_azerty_branch, pb_azerty_qz_swap, pb_spare_keys_azerty (wrong branch)
#   pb_non_roman_branch and all sub-branches (not non-roman)
#   pb_other_free_entry (not taken)
#   pb_punctuation_list (no special punctuation)

flow_id: phase_b_characters
phase: "B"

answers:
  - questionId: pb_discovery_intro
    value: "manual"

  # pb_routing_branch is engine-resolved (never shown), so it is omitted from
  # answers. Its resolved value is recorded as routing_group in the footer.

  - questionId: pb_standard_letters
    value: "extended-latin"

  - questionId: pb_accent_marks_gate
    value: "true"

  - questionId: pb_diacritic_select
    value: "U+0301, U+0300, U+0304, U+0302"

  # Bafut vowels can carry two marks simultaneously:
  # e.g. high-falling tone = acute + circumflex on same vowel
  - questionId: pb_stacking_marks
    value: "true"

  # Most toned forms lack precomposed ready-made characters;
  # combining marks are necessary and preferred by the community.
  - questionId: pb_mark_style
    value: "combining"

  - questionId: pb_capitals_marks
    value: "keep"

  # Community preference: press a look-alike key (n -> ŋ, o -> ɔ, e -> ɛ).
  # This is shape-based, so per §7.1 it maps to A3: weak (phonetic intuition is
  # "strong" only when the user would type the Latin SPELLING of the sound).
  - questionId: pb_typing_approach
    value: "lookalike"

  - questionId: pb_special_letters
    value: "true"

  # Lowercase and uppercase forms listed together, space-separated.
  - questionId: pb_special_letters_list
    value: "ŋ Ŋ ɨ Ɨ ə Ə ɔ Ɔ ɛ Ɛ"

  - questionId: pb_special_letters_notes
    value: "All five vowel-like letters have uppercase equivalents used at sentence-start and in proper names."

  - questionId: pb_punctuation_gate
    value: "false"

  - questionId: pb_digit_set
    value: "western"

  # 5 special letters + 4 diacritic marks + uppercase variants = ~14 new characters.
  # Falls in the 5-20 range -> A1: small.
  - questionId: pb_char_count
    value: "small"

  - questionId: pb_latin_qwerty_branch
    value: "many-bases"

  # X and Q are not used in Bafut orthography -> spare keys available -> A7: many.
  - questionId: pb_spare_keys_qwerty
    value: "X Q"

  - questionId: pb_additional_methods
    value: "done"

# Computed from answers (informational -- not part of SurveyAnswer[]):
computed_axes:
  A1: small
  A3: weak
  A4: stacking-combining
  A7: many

routing_group: qwerty-qwertz
# script_family: not applicable (Latin script, routing group is qwerty-qwertz)

# Strategy resolution (informational -- engine computes from axes via §7.2):
#   A4 == stacking-combining, A1 == small
#   -> §7.2 rule 7 fires (stacking on a small inventory); A3 is not a condition
#      of rule 7, so A3 == weak does not change the outcome.
#   -> primary_strategy: S-02
#   -> secondary_strategies: [S-04]   (§7.2 rule 7: stacking needs S-04)
#   A7 == many  -> S-08 not required as additional secondary
#
primary_strategy: S-02
secondary_strategies:
  - S-04

# eligible_pattern_ids (patterns whose strategyId == "S-02" or
# combinesWith includes "S-04"):
#   Exact IDs depend on the pattern library state at time of run.
#   Representative examples:
#     - latin-diacritic-deadkey-s02        (S-02 primary, deadkey for each mark)
#     - latin-diacritic-stacking-s02-s04   (S-02 + S-04 chained for stacked marks)
#
# eligible_inventory_entries (InventoryChar[], method: "manual"):
#   The inventory below reflects the manual-entry answers above.
#   inBaseOutput is false for all entries (none are on standard QWERTY).
#   All are tagged method: "manual".
#
#   NOTE ON char ENCODING: per packages/contracts/src/characterDiscovery.ts the
#   InventoryChar.char field holds the ACTUAL grapheme cluster (e.g. "é"), never
#   a "U+xxxx" string. The combining marks below are shown by codepoint only
#   because a bare combining mark is invisible in this comment; the real entry
#   would carry the actual combining character (e.g. "́" for acute).
#
#   Diacritics (combining marks, to be stacked) -- char shown as codepoint here:
#     { char: <U+0301 acute>,      inBaseOutput: false, method: "manual" }
#     { char: <U+0300 grave>,      inBaseOutput: false, method: "manual" }
#     { char: <U+0304 macron>,     inBaseOutput: false, method: "manual" }
#     { char: <U+0302 circumflex>, inBaseOutput: false, method: "manual" }
#
#   Special letters (char is the actual grapheme; codepoint in comment):
#     { char: "ŋ",  inBaseOutput: false, method: "manual" }  -- U+014B
#     { char: "Ŋ",  inBaseOutput: false, method: "manual" }  -- U+014A
#     { char: "ɨ",  inBaseOutput: false, method: "manual" }  -- U+0268
#     { char: "Ɨ",  inBaseOutput: false, method: "manual" }  -- U+0197 (correct case-pair of ɨ)
#     { char: "ə",  inBaseOutput: false, method: "manual" }  -- U+0259
#     { char: "Ə",  inBaseOutput: false, method: "manual" }  -- U+018F
#     { char: "ɔ",  inBaseOutput: false, method: "manual" }  -- U+0254
#     { char: "Ɔ",  inBaseOutput: false, method: "manual" }  -- U+0186
#     { char: "ɛ",  inBaseOutput: false, method: "manual" }  -- U+025B
#     { char: "Ɛ",  inBaseOutput: false, method: "manual" }  -- U+0190
